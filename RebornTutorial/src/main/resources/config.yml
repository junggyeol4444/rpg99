  DEMON:      [demon_blast, hell_fire_low]
  HEAVEN:     [holy_light, shield_of_light]
  SPIRIT:     [element_sense, essence_collect, element_bullet]
  MARTIAL:    [samje_basic_form]
  IMMORTAL:   [yeongi_basic, talisman_basic]
  YOKAI:      [transform_human, fox_fire]
  EARTH:      [hunter_basic, gun_handling]
  MAGITECH:   [drone_summon, energy_shield]
  APOCALYPSE: [survival_kit, basic_firearm]
  CYBERPUNK:  [neural_accel]
  DRAGON:     [breath_basic, flight]
  OCEAN:      [water_breathing, basic_navigation]

# 튜토리얼 NPC 최소 스탯
tutorial-npc-min-stat: 10000
champion-npc-stat: 50000
