stage1-minutes: 10
stage2-minutes: 10
stage3-portal-cooldown-seconds: 60

protected-zones:  # 세계별 보호 구역. 좌표 직접 지정.
  FANTASY:
    - { world: tutorial_fantasy, min: { x: -50, y: 0, z: -50 }, max: { x: 50, y: 256, z: 50 } }

unprotected-mob-multiplier: 1.5

