underworld:
  world: underworld
  arrive: { x: 0.5, y: 64, z: 0.5 }
  revive-min-seconds: 300
  reincarnate-min-seconds: 1800
  revive-min-underworld-ki: 50

drop:
  pickup-only-owner-seconds: 600

reincarnation:
  bonus-by-tier:
    "절대자": { LUCK: 5, MENTAL: 3 }
    "그랜드 마스터": { LUCK: 3 }
    "default": { LUCK: 1 }
  permanent-titles: [환생자, 영원의여행자]

crime:
  pk-crime: 100
  pk-fame: -50
  hourly-decay: 10
  thresholds:
    - { min: 0, level: 0, label: "일반" }
    - { min: 100, level: 1, label: "1등급 — NPC 경계" }
    - { min: 300, level: 2, label: "2등급 — NPC 적대" }
    - { min: 600, level: 3, label: "3등급 — 포스터" }
    - { min: 1000, level: 4, label: "4등급 — 사냥꾼 파견" }
    - { min: 2000, level: 5, label: "5등급 — 전 세계 수배" }

abyss:
  inner-resistance-zero-vanish: true
  start-resistance: 100
  decay-per-minute: 1
  decay-near-abyss-beast: 5
  hostile-mind-erosion-percent: 0.5

  # ─── 심연수 (절대자급 이상) ───
  beasts:
    abyss_eye:        { name: "&0&l심연의 눈",     hp: 1000000, damage: 5000, threat: ABSOLUTE_PLUS, description: "심연의 의식체. 모든 세계의 관찰자" }
    chaos_devourer:   { name: "&5&l혼돈 포식자",   hp: 500000,  damage: 3500, threat: ABSOLUTE,      description: "차원을 먹어치우는 존재" }
    void_serpent:     { name: "&0&l허공의 뱀",     hp: 400000,  damage: 3000, threat: ABSOLUTE,      description: "심연 깊은 곳에 잠든 거대 뱀" }
    nameless_one:     { name: "&8&l이름 없는 자",  hp: 600000,  damage: 4000, threat: ABSOLUTE,      description: "이름을 갖기 전에 존재한 자" }
    silence_lord:     { name: "&7&l침묵의 주인",   hp: 350000,  damage: 2500, threat: ABSOLUTE,      description: "소리·언어·생각을 빨아들임" }

