analysis-tick-interval: 6000   # 5분

thresholds:
  inflation:
    warn: 150
    severe: 200
  trade-activity:
    stagnant: 0.5
    overheat: 2.0
  political:
    war-tension: 80
    festival-stability: 80
  mob:
    overflow-multiplier: 2.0
  disaster-percent-per-cycle: 1.5

quest-cooldowns:
  WAR: 604800     # 7일
  ECON_CRISIS: 259200  # 3일
  MOB_INVASION: 86400
  PEACE_FESTIVAL: 604800

