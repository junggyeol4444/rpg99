name: RebornEconomy
version: '${project.version}'
main: kr.reborn.economy.RebornEconomy
api-version: '1.20'
folia-supported: true
authors: [ReincarnationWorld]
description: 13세계 화폐·환전·상점·경매·거래
depend: [RebornCore]
softdepend: [RebornNPC, RebornCraft, RebornWorldAI]
load: POSTWORLD
commands:
  money:
    description: 보유 화폐 조회
    aliases: [bal, balance]
  pay:
    description: 다른 플레이어에게 화폐 송금
    usage: /pay <player> <currency> <amount>
  exchange:
    description: 환전 GUI
    aliases: [ex]
  shop:
    description: 상점 GUI
  auction:
    description: 경매장 GUI
    aliases: [ah]
  trade:
    description: 플레이어와 거래
    usage: /trade <player>
  mailbox:
    description: 우편함 GUI
    aliases: [mail]
permissions:
  reborneconomy.use:
    default: true
  reborneconomy.admin:
    default: op
