ascend:
  faith-required: 10000
  challenge-trials-required: 2

tiers:
  - { name: "하급신",  min: 1,     max: 1000  }
  - { name: "중급신",  min: 1000,  max: 5000  }
  - { name: "상급신",  min: 5000,  max: 10000 }
  - { name: "주신",    min: 10000, max: 49999 }
  - { name: "개념신",  min: 50000, max: 999999 }

domain:
  size:
    하급신: 500
    중급신: 2000
    상급신: 10000
    주신: 100000
    개념신: 999999
  upkeep-divinity-per-day: 10

skills:
  divine_shield:    { tier: 하급신, cost: 50,  effect: SHIELD_10S }
