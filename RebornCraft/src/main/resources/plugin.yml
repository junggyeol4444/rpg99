name: RebornCraft
version: '${project.version}'
main: kr.reborn.craft.RebornCraft
api-version: '1.20'
folia-supported: true
authors: [ReincarnationWorld]
description: 커스텀 아이템 + 7등급 + 제작 직업
depend: [RebornCore]
softdepend: [RebornStat]
load: POSTWORLD
commands:
  craft:
    description: 제작 GUI
  accessory:
    description: 장신구 GUI
    aliases: [acc]
  repair:
    description: 수리 (NPC 또는 아이템)
  enchant:
    description: 강화 GUI (마법부여사 전용)
  craftitem:
    description: 커스텀 아이템 지급 (관리자)
    usage: /craftitem <id>
  specialty:
    description: 특화 제작 — 연단/마도공학/사이버해킹/연금술/결정학/룬각/영조/단조/직조/보석세공/향수술/약학
    aliases: [sp, craft2]
    usage: /specialty list|recipes|craft|info
permissions:
  reborncraft.use:
    default: true
  reborncraft.admin:
    default: op
