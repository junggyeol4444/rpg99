  world_decree:     { tier: 중급신, cost: 500, effect: WORLD_RULE_1H }
  divine_punishment: { tier: 상급신, cost: 1000, effect: DAMAGE_X10 }
  avatar_descent:   { tier: 주신,   cost: 5000, effect: AVATAR_30M }
