  # 아포칼립스
  rebirth_cult:      { name: "&2종말 부흥교",      god: apoc_root,       world: APOCALYPSE, founded-by: NPC, base-faith: 4000, doctrine: "종말은 신의 심판이며 변종이 선택" }
  # 사이버펑크
  singularity_cult:  { name: "&5싱귤래리티 교단",  god: cyber_singular,  world: CYBERPUNK, founded-by: NPC, base-faith: 5000, doctrine: "인간과 기계의 경계를 초월하라" }
