name: RebornWorldAI
version: '${project.version}'
main: kr.reborn.worldai.RebornWorldAI
api-version: '1.20'
folia-supported: true
authors: [ReincarnationWorld]
description: 13세계 자율 AI (경제·정치·몬스터·날씨·월드 퀘스트·NPC 지시)
depend: [RebornCore]
softdepend: [RebornNPC, RebornMob, RebornQuest, RebornEconomy, RebornStat, RebornClan, RebornTime, RebornSkill]
load: POSTWORLD
commands:
  worldai:
    description: 세계 AI 시스템 — 상태/세력/시장/이주/역사/시대/재해/날씨/로그/강제트리거
    permission: rebornworldai.admin
    usage: |
      /worldai status <WORLD>
      /worldai factions <WORLD>
      /worldai market <WORLD>
      /worldai migration
      /worldai history <WORLD> [N]
      /worldai epoch [WORLD]
      /worldai disaster <WORLD> <type>
      /worldai weather <WORLD> <name>
      /worldai log [N]
      /worldai force <WORLD> <WAR|FESTIVAL|CRISIS|REVOLT|OVERFLOW>
  world:
    description: 13세계 통합 상태 한 화면
    aliases: [worlds]
permissions:
  rebornworldai.admin: { default: op }
