  # 시간계
  time_guardian:         { name: "&e&l시간 수호자",         world: TIME_REALM, hp: 80000,  damage: 600, role: 관리자, description: "시간계의 신급 관리자" }
  paradox_wraith:        { name: "&e&l역설의 혼령",          world: TIME_REALM, hp: 12000,  damage: 250, description: "시간 역류로 태어난 모순체" }
  # 꿈의 세계
  dream_lord_npc:        { name: "&d&l꿈의 군주",            world: DREAM,      hp: 100000, damage: 800, role: 지배자, description: "현실과 꿈의 경계를 흐릿하게 한다" }
  nightmare_spawn:       { name: "&5악몽의 새끼",            world: DREAM,      hp: 3000,   damage: 200, description: "악몽에서 태어난 작은 공포" }
  dream_eater:           { name: "&d&l꿈을 먹는 자",          world: DREAM,      hp: 30000,  damage: 500, description: "잠든 자의 꿈을 빨아먹는 거대 존재" }
  # 허공계
  void_wanderer:         { name: "&8허공 유랑자",           world: VOID,       hp: 8000,   damage: 200, description: "허공에 갇혀 떠도는 존재" }
  dimension_predator:    { name: "&5&l차원 포식자",          world: VOID,       hp: 80000,  damage: 700, description: "세계의 벽을 갉아먹는다" }
  void_drift:            { name: "&8허공의 표류",            world: VOID,       hp: 2000,   damage: 150, description: "차원 사이의 잔재" }
  # 신계
  divine_servant:        { name: "&6신의 시종",              world: GOD,        hp: 50000,  damage: 400, description: "주신을 섬기는 자" }
  divine_messenger:      { name: "&e신의 사자",              world: GOD,        hp: 20000,  damage: 250, description: "신의 의지를 전하는 자" }
  concept_fragment:      { name: "&0&l개념의 파편",          world: GOD,        hp: 200000, damage: 1500, description: "개념신의 일부가 떨어져 나온 존재" }

# 히든 월드 규칙 보조
hidden-world-rules:
  time_realm:
    time-flux-percent: 30
    past-change-events: true
  dream:
    sleep-required: true
    mental-key-stat: MENTAL
    imagination-power-bonus: 2.0
