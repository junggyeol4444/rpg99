  dark_church:       { name: "&5어둠의 교단",       god: arcanus,         world: FANTASY, founded-by: NPC, base-faith: 3000, doctrine: "균형을 위한 어둠의 길", forbidden: true }
  nature_circle:     { name: "&a자연의 원",         god: fantasy_nature,  world: FANTASY, founded-by: NPC, base-faith: 6000, doctrine: "자연을 거스르지 말라" }
  war_legion:        { name: "&c전쟁의 군단",       god: fantasy_war,     world: FANTASY, founded-by: NPC, base-faith: 5000, doctrine: "강함이 곧 정의다" }
  death_sect:        { name: "&8죽음의 의회",       god: fantasy_death,   world: FANTASY, founded-by: NPC, base-faith: 4000, doctrine: "죽음은 끝이 아닌 윤회의 시작" }
  # 마계
