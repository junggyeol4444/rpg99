# ============================================================
# 무공 다중 초식 — 비급 하나에 여러 초식.
# 시전 시 초식이 순환하고, 숙련도 10마다 1개씩 해금된다.
# mult: 데미지 배수 / element: 속성 덮어쓰기 / desc: 초식 풀이
# ============================================================
techniques:

  # ─── 독고구검 (獨孤九劍) — 9초식 ───
  dokgo_gugeom:
    - { name: "총결식 (總訣式)",   mult: 1.00, desc: "9초식 모든 변화의 뿌리. 무공의 원리를 꿰뚫는다" }
    - { name: "파검식 (破劍式)",   mult: 1.10, desc: "천하 모든 검법을 파해한다" }
    - { name: "파도식 (破刀式)",   mult: 1.10, desc: "모든 도법을 파해한다" }
    - { name: "파창식 (破槍式)",   mult: 1.15, desc: "창·모·과 등 장병기를 파해한다" }
    - { name: "파편식 (破鞭式)",   mult: 1.10, desc: "편·삼절곤 등 연병기를 파해한다" }
    - { name: "파삭식 (破索式)",   mult: 1.10, desc: "줄·채찍·갈고리를 파해한다" }
    - { name: "파장식 (破掌式)",   mult: 1.20, desc: "장법·권법·지법을 파해한다" }
    - { name: "파전식 (破箭式)",   mult: 1.15, desc: "암기·궁시를 파해한다" }
    - { name: "파기식 (破氣式)",   mult: 1.40, desc: "검기·기로 펴는 모든 무공을 파해한다" }

  # ─── 항룡십팔장 (降龍十八掌) — 18장 (주역 변화) ───
  hangryong_18jang:
    - { name: "잠룡물용 (潛龍勿用)", mult: 0.90, desc: "용이 잠겨 아직 쓰지 않는다 — 축력의 일장" }
    - { name: "견룡재전 (見龍在田)", mult: 1.00, desc: "용이 들에 보인다 — 정정당당한 일장" }
    - { name: "종일건건 (終日乾乾)", mult: 1.05, desc: "종일 굳세고 굳세다 — 연속의 일장" }
    - { name: "혹약재연 (或躍在淵)", mult: 1.10, desc: "혹은 뛰어 연못에 든다 — 변화의 일장" }
    - { name: "비룡재천 (飛龍在天)", mult: 1.25, desc: "용이 하늘을 난다 — 정점의 일장" }
    - { name: "항룡유회 (亢龍有悔)", mult: 1.40, desc: "지나친 용은 후회한다 — 18장의 첫 깨달음" }
    - { name: "이견대인 (利見大人)", mult: 1.15, desc: "큰 사람을 봄이 이롭다 — 인덕의 일장" }
    - { name: "홍점우륙 (鴻漸于陸)", mult: 1.15, desc: "기러기가 뭍에 차차 나아간다" }
    - { name: "돌여기래 (突如其來)", mult: 1.30, desc: "갑작스레 오니 그 기세 막을 수 없다" }
    - { name: "진경백리 (震驚百里)", mult: 1.35, desc: "우레가 백 리를 놀라게 한다" }
    - { name: "어약우연 (魚躍于淵)", mult: 1.20, desc: "고기가 연못에서 뛰어오른다" }
    - { name: "시승육룡 (時乘六龍)", mult: 1.30, desc: "때를 타 여섯 용을 부린다" }
    - { name: "밀운불우 (密雲不雨)", mult: 1.05, desc: "구름은 두꺼우나 비는 내리지 않는다" }
    - { name: "손칙유부 (損則有孚)", mult: 1.10, desc: "덜어내면 믿음이 있다" }
    - { name: "용전우야 (龍戰于野)", mult: 1.35, desc: "용이 들에서 싸운다 — 결전의 일장" }
    - { name: "신용파미 (神龍擺尾)", mult: 1.30, desc: "신룡이 꼬리를 휘두른다" }
    - { name: "리상견빙 (履霜堅冰)", mult: 1.20, desc: "서리를 밟으면 굳은 얼음이 머지 않다" }
    - { name: "강룡재천 (亢龍在天)", mult: 1.55, desc: "지존의 일장. 18장의 정수가 결집" }

  # ─── 구양진경 (九陽眞經) — 9양 단계 ───
  guyang_jingyung:
    - { name: "일양정기 (一陽正氣)",  mult: 1.00, element: FIRE, desc: "한 줄기 양기가 단전에 자리잡는다" }
    - { name: "이양조림 (二陽調臨)",  mult: 1.10, element: FIRE, desc: "두 양이 어울려 임한다" }
    - { name: "삼양개태 (三陽開泰)",  mult: 1.20, element: FIRE, desc: "세 양이 태평을 연다" }
    - { name: "사양만물 (四陽萬物)",  mult: 1.30, element: FIRE, desc: "양기가 만물을 꿰뚫는다" }
    - { name: "오양순양 (五陽純陽)",  mult: 1.40, element: FIRE, desc: "양이 정련되어 잡것 없다" }
    - { name: "육양극치 (六陽極致)",  mult: 1.50, element: FIRE, desc: "양의 극치 — 한독 면역" }
    - { name: "칠양훈천 (七陽勳天)",  mult: 1.60, element: FIRE, desc: "양기가 하늘을 사른다" }
    - { name: "팔양삼복 (八陽三復)",  mult: 1.75, element: FIRE, desc: "팔양이 세 번 거듭 되돌아온다" }
    - { name: "구양귀일 (九陽歸一)",  mult: 2.00, element: FIRE, desc: "구양의 모든 빛이 하나로 귀일한다" }

  # ─── 구음진경 (九陰眞經) — 9음 단계 ───
  guum_jingyung:
    - { name: "환선형질 (還先形質)",  mult: 1.00, element: ICE, desc: "신체를 본래의 형질로 되돌린다" }
    - { name: "이도살인 (易道殺人)",  mult: 1.15, element: DARK, desc: "역의 도로 사람을 멸한다" }
    - { name: "회혼대법 (回魂大法)",  mult: 1.20, element: DARK, desc: "혼을 되돌리는 음의 비법" }
    - { name: "최심장 (摧心掌)",       mult: 1.30, element: DARK, desc: "심장을 깨뜨리는 음한장법" }
    - { name: "구음백골조 (九陰白骨爪)", mult: 1.40, element: DARK, desc: "음기가 응축된 백골의 손톱" }
    - { name: "음양조화 (陰陽調和)",   mult: 1.35, desc: "음양이 어우러진다" }
    - { name: "천망지망 (天網地網)",   mult: 1.45, element: DARK, desc: "하늘과 땅의 그물로 가둔다" }
    - { name: "음극생양 (陰極生陽)",   mult: 1.55, element: FIRE, desc: "음이 극에 달해 양이 솟는다" }
    - { name: "구음귀종 (九陰歸宗)",   mult: 1.80, element: DARK, desc: "구음의 모든 결이 본원으로 돌아간다" }

  # ─── 천마신공 (天魔神功) — 마교 비전 ───
  cheonma_singong:
    - { name: "흡혈마기 (吸血魔氣)",   mult: 1.00, element: DARK, desc: "피와 마기를 빨아들인다" }
    - { name: "마기난무 (魔氣亂舞)",   mult: 1.15, element: DARK, desc: "마기가 난무한다" }
    - { name: "천마혈해 (天魔血海)",   mult: 1.30, element: DARK, desc: "피의 바다 속에 천마가 군림한다" }
    - { name: "마혼분신 (魔魂分身)",   mult: 1.20, element: DARK, desc: "마의 혼이 분신을 부린다" }
    - { name: "천마무한 (天魔無限)",   mult: 1.45, element: DARK, desc: "천마의 마기에 끝이 없다" }
    - { name: "마기폭류 (魔氣暴流)",   mult: 1.55, element: DARK, desc: "마기가 폭류로 휘몰아친다" }
    - { name: "천마강림 (天魔降臨)",   mult: 2.00, element: DARK, desc: "천마 자체가 강림한다 — 최종 절학" }

  # ─── 사자후 (獅子吼) — 소림 음공 7초식 ───
  saja_hu:
    - { name: "일성노후 (一聲怒吼)",   mult: 1.00, desc: "한 소리에 만물이 떤다" }
    - { name: "노한사자 (怒喊獅子)",   mult: 1.10, desc: "노한 사자의 부르짖음" }
    - { name: "군사난무 (羣獅亂舞)",   mult: 1.20, desc: "사자 무리가 어지러이 춤춘다" }
    - { name: "노후만뇌 (怒吼萬雷)",   mult: 1.30, desc: "만뇌가 함께 울린다" }
    - { name: "사자분노 (獅子奮怒)",   mult: 1.35, desc: "사자가 분노를 떨친다" }
    - { name: "백수왕성 (百獸王聲)",   mult: 1.50, desc: "백수의 왕이 호령한다" }
    - { name: "사자귀종 (獅子歸宗)",   mult: 1.65, desc: "사자후의 모든 음이 하나로 모인다" }

  # ─── 탄지신통 (彈指神通) — 손가락 점법 7초식 ───
  tanji_singtong:
    - { name: "일지탄 (一指彈)",       mult: 1.00, desc: "한 손가락의 탄출" }
    - { name: "쌍지탄 (雙指彈)",       mult: 1.15, desc: "두 손가락의 동시 탄출" }
    - { name: "삼지탄 (三指彈)",       mult: 1.25, desc: "세 손가락의 연환 탄출" }
    - { name: "사지정 (四指定)",       mult: 1.30, desc: "네 손가락이 정점을 짚는다" }
    - { name: "오지섬 (五指閃)",       mult: 1.40, desc: "다섯 손가락이 번쩍인다" }
    - { name: "만지환 (萬指幻)",       mult: 1.55, desc: "환영 같은 만 개의 손가락" }
    - { name: "천지탄 (天地彈)",       mult: 1.75, desc: "천지를 가르는 한 점" }

  # ─── 일양지 (一陽指) — 양기 손가락 5초식 ───
  ilyangji:
    - { name: "일양생기 (一陽生氣)",   mult: 1.00, element: FIRE, desc: "한 줄기 양기가 손끝에 깃든다" }
    - { name: "일양만순 (一陽萬巡)",   mult: 1.15, element: FIRE, desc: "양기가 만 경맥을 도는다" }
    - { name: "일양극태 (一陽極泰)",   mult: 1.30, element: FIRE, desc: "양기가 극에 다다라 평정에 이른다" }
    - { name: "일양현현 (一陽玄玄)",   mult: 1.45, element: FIRE, desc: "현묘한 양의 광휘" }
    - { name: "일양무극 (一陽無極)",   mult: 1.70, element: FIRE, desc: "한 양이 무극에 닿는다" }

  # ─── 육맥신검 (六脈神劍) — 6 손가락 검 ───
  yukmaek_singeom:
    - { name: "소상검 (少商劍)",       mult: 1.10, desc: "엄지의 검 — 폐경(肺經)의 기" }
    - { name: "상양검 (商陽劍)",       mult: 1.15, desc: "검지의 검 — 대장경의 기" }
    - { name: "중충검 (中衝劍)",       mult: 1.25, desc: "중지의 검 — 심포경의 기" }
    - { name: "관충검 (關衝劍)",       mult: 1.20, desc: "약지의 검 — 삼초경의 기" }
    - { name: "소충검 (少衝劍)",       mult: 1.30, desc: "소지의 검 — 심경의 기" }
    - { name: "소택검 (少澤劍)",       mult: 1.40, desc: "새끼의 검 — 소장경의 기" }

  # ─── 건곤대나이 (乾坤大挪移) — 7층 ───
  geongon_daenai:
    - { name: "1층 — 기초 변환",     mult: 1.00, desc: "기초적인 흐름 전환" }
    - { name: "2층 — 자가 회복",     mult: 1.10, desc: "스스로 내공을 돌려 회복한다" }
    - { name: "3층 — 외력 전환",     mult: 1.20, desc: "외력을 받아 다른 방향으로 흘려보낸다" }
    - { name: "4층 — 반격 강화",     mult: 1.35, desc: "전환된 외력에 자신의 내공을 보태 되돌린다" }
    - { name: "5층 — 음양 조화",     mult: 1.50, desc: "음양을 한 손에 거머쥔다" }
    - { name: "6층 — 만물반전",     mult: 1.70, desc: "주위 모든 기를 자유로이 옮긴다" }
    - { name: "7층 — 건곤만물",     mult: 2.00, desc: "건곤이 손바닥 안에 있다 — 7층의 정수" }

  # ─── 빙잠독경 (氷蠶毒經) — 독공 6초식 ───
  bingjam_dokgyeong:
    - { name: "빙독초보 (氷毒初步)",   mult: 1.00, element: POISON, desc: "빙독의 첫걸음" }
    - { name: "빙독무염 (氷毒無染)",   mult: 1.15, element: POISON, desc: "독에 물들지 않는 신체" }
    - { name: "만독독공 (萬毒毒攻)",   mult: 1.30, element: POISON, desc: "만 가지 독을 동시에 펼친다" }
    - { name: "빙잠지력 (氷蠶之力)",   mult: 1.40, element: ICE,    desc: "만년빙잠의 힘이 깃든다" }
    - { name: "만독불침 (萬毒不侵)",   mult: 1.35, element: POISON, desc: "모든 독이 침입하지 못한다" }
    - { name: "독신만세 (毒神萬歲)",   mult: 1.60, element: POISON, desc: "독의 신이 깨어난다" }

  # ─── 혈마대법 (血魔大法) — 혈공 5초식 ───
  hyeolma_daebeop:
    - { name: "혈음흡공 (血陰吸功)",   mult: 1.00, element: DARK, desc: "피를 매개로 내공을 빨아들인다" }
    - { name: "혈마난무 (血魔亂舞)",   mult: 1.20, element: DARK, desc: "혈마가 어지러이 춤춘다" }
    - { name: "혈해마기 (血海魔氣)",   mult: 1.35, element: DARK, desc: "피바다에서 마기가 솟구친다" }
    - { name: "혈마강림 (血魔降臨)",   mult: 1.55, element: DARK, desc: "혈마가 강림한다" }
    - { name: "혈마지존 (血魔至尊)",   mult: 1.80, element: DARK, desc: "혈마의 정점에 선다" }

  # ─── 비천신공 (飛天神功) — 경공 5초식 ───
  bicheon_singong:
    - { name: "일진보 (一塵步)",       mult: 1.00, desc: "한 점 먼지를 밟듯이 가볍다" }
    - { name: "운보비공 (雲步飛空)",   mult: 1.10, desc: "구름 위를 걷듯 허공을 난다" }
    - { name: "비천산해 (飛天散海)",   mult: 1.20, desc: "하늘을 날아 바다를 갈른다" }
    - { name: "능공허도 (凌空虛渡)",   mult: 1.30, desc: "허공을 가른다" }
    - { name: "비룡재천 (飛龍在天)",   mult: 1.45, desc: "비룡이 하늘에 머문다" }

  # ─── 북명신공 (北冥神功) — 흡공 4초식 ───
  bukmyeong_singong:
    - { name: "음기응축 (陰氣凝縮)",   mult: 1.00, element: ICE, desc: "음기를 응축시킨다" }
    - { name: "흡북명 (吸北冥)",       mult: 1.20, element: ICE, desc: "북명의 깊은 내공을 흡수한다" }
    - { name: "내공정제 (內功精製)",   mult: 1.30, desc: "흡수한 내공을 자기 것으로 정제한다" }
    - { name: "만내공통일 (萬內功統一)", mult: 1.55, desc: "잡다한 내공을 하나로 통일한다" }

  # ─── 태극혼원공 (太極混元功) — 음양조화 5초식 ───
  taeguk_hwonwon:
    - { name: "무극생태극 (無極生太極)", mult: 1.00, desc: "무극에서 태극이 생긴다" }
    - { name: "음양태극 (陰陽太極)",   mult: 1.15, desc: "음양이 서로 안는다" }
    - { name: "양의생사상 (兩儀生四象)", mult: 1.25, desc: "양의가 사상을 낳는다" }
    - { name: "사상생팔괘 (四象生八卦)", mult: 1.40, desc: "사상이 팔괘로 펼쳐진다" }
    - { name: "혼원귀일 (混元歸一)",   mult: 1.65, desc: "혼원이 하나로 귀일한다" }

  # ─── 흡성대법 (吸星大法) — 흡공 4초식 ───
  heupseong_daebeop:
    - { name: "흡혈편 (吸血篇)",       mult: 1.00, element: DARK, desc: "피로 흐르는 내공을 흡수" }
    - { name: "흡력편 (吸力篇)",       mult: 1.15, element: DARK, desc: "기력 자체를 흡수" }
    - { name: "흡혼편 (吸魂篇)",       mult: 1.35, element: DARK, desc: "혼령마저 빨아들인다" }
    - { name: "흡성귀종 (吸星歸宗)",   mult: 1.55, element: DARK, desc: "별의 모든 빛마저 흡수" }

  # ─── 화산검법 (華山劍法) — 기검·정검 + 매화 6초식 ───
  hwasan_geombeob:
    - { name: "기검 (奇劍) — 변칙의 검", mult: 1.10, desc: "예상치 못한 각도와 속도" }
    - { name: "정검 (正劍) — 정통의 검", mult: 1.15, desc: "올곧고 강한 정공의 검" }
    - { name: "매화점점 (梅花點點)",   mult: 1.20, desc: "매화 꽃잎이 흩날린다" }
