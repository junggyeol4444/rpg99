name: build

# 실제 빌드 검증 — GitHub 러너는 Paper API를 받을 수 있으므로
# 모든 모듈을 진짜 컴파일하고, 깨지는 곳을 정확히 보고한다.
on:
  push:
    branches: [ "**" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build (compile + jar, all modules)
        run: ./gradlew clean build --no-daemon --stacktrace
