  # 드래곤
  dragon_temple:     { name: "&6&l용족 시조 신전", god: dragon_root,     world: DRAGON,  founded-by: NPC, base-faith: 15000, doctrine: "용은 천하의 정점" }
  # 해양
  sea_god_cult:      { name: "&3해왕 신앙",        god: ocean_root,      world: OCEAN,   founded-by: NPC, base-faith: 8000, doctrine: "바다가 모든 생명의 어머니" }
  kraken_worshippers: { name: "&3&l크라켄 신전",   god: ocean_root,      world: OCEAN,   founded-by: NPC, base-faith: 4000, doctrine: "크라켄은 바다의 화신" }
  # 시간계
  time_keepers:      { name: "&e&l시간 수호 교단", god: time_warden,     world: TIME_REALM, founded-by: NPC, base-faith: 18000, doctrine: "시간을 바꾸지 말라" }
  # 명계
  myungwang_order:   { name: "&8&l명왕 사찰",      god: myungwang,       world: UNDERWORLD, founded-by: NPC, base-faith: 12000, doctrine: "윤회는 영혼의 의무" }

