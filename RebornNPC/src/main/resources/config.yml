emotion-decay-rate:
  anger: 1.5
  fear: 1.0
  trust: 0.2
  happiness: 0.5
  sadness: 0.3
  curiosity: 0.4

relation:
  same-faction-bonus: 30
  enemy-faction-penalty: -30

