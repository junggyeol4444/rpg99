# 히든 월드 6개
# ============================================================
hidden-worlds:
  abyss:
    name: "심연계"
    description: "모든 세계의 최하층. 태초의 존재(심연수)가 잠들어 있음."
    enter-condition: "심연의 균열 발견 또는 절대자 의도 진입"
    rules: { stat-mult-on-enter: 0.5, energy-corruption: true, hostile-mind-erosion: true }
    inhabitants: [심연수, 심연의 눈]
  underworld:
    name: "명계"
    description: "죽은 자의 세계. 윤회·심판·정화."
    enter-condition: "사망 후 자동 또는 귀문관 진입"
    rules: { time-different: true }
    inhabitants: [명병, 명수, 명왕, 환혼자]
  time_realm:
    name: "시간계"
    description: "시간의 흐름이 공간. 과거·현재·미래 동시 존재."
    enter-condition: "시간 금기 술법 또는 시간의 균열"
    rules: { time-flux: true, past-changes-affect-present: true }
    inhabitants: [시간 수호자]
  dream:
    name: "꿈의 세계"
    description: "모든 존재의 꿈이 모이는 세계."
    enter-condition: "수면 중 특수 조건"
    rules: { imagination-is-power: true, mental-stat-key: true }
    inhabitants: [꿈의 군주]
  void:
    name: "허공계"
    description: "세계와 세계 사이의 빈 공간."
    enter-condition: "차원 이동 중 이탈 또는 절대자 의도"
    rules: { time-unstable: true, direction-disorienting: true }
    inhabitants: [허공 유랑자, 차원 포식자]
  god_realm:
    name: "신계"
    description: "신이 된 자들이 거주."
    enter-condition: "신 등극 (하급신 이상)"
    rules: { domain-system: true, god-absolute-in-own-domain: true }
    inhabitants: [신, 개념신]

