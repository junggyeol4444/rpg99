  # 드래곤계 5대 가문 시간의 방 (가주별 환경)
  dragon_chamber_aurelius: { mode: SCALE, ratio: 10, environment: HOLY }
  dragon_chamber_ignifer:  { mode: SCALE, ratio: 10, environment: FIRE }
